name: Android Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-release-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build and test
        run: ./gradlew --no-daemon lint testDebugUnitTest assembleDebug

      - name: Prepare APK asset
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk "release/CodexBar-Android-${GITHUB_REF_NAME}.apk"
          sha256sum "release/CodexBar-Android-${GITHUB_REF_NAME}.apk" > "release/CodexBar-Android-${GITHUB_REF_NAME}.apk.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexBar-Android-${{ github.ref_name }}
          path: release/*
          retention-days: 30

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          prerelease: false
